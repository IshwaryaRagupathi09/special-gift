<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Ennavl 💚</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Great+Vibes&family=Fredoka:wght@400;600&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark-green: #041408;
            --grid-border-green: #1f4a27;
            --heart-green: #2a6f39;
            --text-glow-green: #79f795;
            --accent-gold: #e2c067;
            --soft-cream: #fbf6ee;
            --panel-pink: #f7d1d5;
            --panel-purple: #e0d1f7;
            --panel-red: #f7cbd1;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background-color: #0c0d0e;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Fredoka', sans-serif;
        }

        /* App Mockup Wrapper */
        .app-container {
            width: 100%;
            max-width: 450px;
            height: 920px;
            background: var(--bg-dark-green);
            position: relative;
            border-radius: 24px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.9);
            overflow: hidden;
            border: 6px solid #1a1c1e;
            display: flex;
            flex-direction: column;
        }

        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: calc(100% - 90px); /* Leave room for fixed music footer bar */
            display: none;
            flex-direction: column;
            align-items: center;
            padding: 24px;
            overflow-y: auto;
            box-sizing: border-box;
            z-index: 10;
        }

        .screen.active {
            display: flex;
        }

        /* Floating Background Heart Accents */
        .bg-hearts {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0; left: 0;
            pointer-events: none;
            z-index: 1;
            opacity: 0.25;
            background-image: radial-gradient(circle, rgba(42,111,57,0.3) 1px, transparent 1px);
            background-size: 24px 24px;
        }

        /* --- VIDEO FLOW: PLS ACCEPT THE GIFT --- */
        #frame-gift-intro {
            background-color: var(--soft-cream);
            color: #433322;
            justify-content: center;
            height: 100%; /* Cover music footer during introduction */
            z-index: 200;
        }
        #frame-gift-intro h2 {
            font-size: 2rem;
            margin-bottom: 40px;
            text-align: center;
            font-weight: 600;
        }
        .penguin-main-box {
            width: 220px;
            height: 220px;
            background: #fff;
            border-radius: 50%;
            border: 4px solid #ebd9c5;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 50px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }
        .intro-btn-group {
            display: flex;
            gap: 20px;
            position: relative;
            width: 100%;
            max-width: 300px;
            justify-content: center;
        }
        .btn-action {
            padding: 12px 40px;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
        }
        .btn-yes-gift { background-color: #e63946; color: white; border: 3px solid #ffb3c1; }
        .btn-no-gift { background-color: #e63946; color: white; border: 3px solid #ffb3c1; }

        /* INTRO COMPONENT ERROR FALLBACK */
        #frame-gift-error {
            background-color: var(--soft-cream);
            color: #433322;
            justify-content: center;
            height: 100%;
            z-index: 201;
        }
        .btn-retry {
            background-color: #e63946;
            color: white;
            padding: 12px 50px;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 30px;
            border: 3px solid #ffb3c1;
            cursor: pointer;
            margin-top: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        /* --- VIDEO FLOW: CHOOSE A PENGUIN --- */
        #frame-choose-penguin {
            background-color: var(--soft-cream);
            color: #433322;
            justify-content: center;
            height: 100%;
            z-index: 190;
            text-align: center;
        }
        #frame-choose-penguin h2 {
            font-size: 1.8rem;
            margin-bottom: 5px;
        }
        #frame-choose-penguin p {
            font-size: 1.1rem;
            color: #7d664d;
            margin-bottom: 40px;
        }
        .penguin-choices-row {
            display: flex;
            gap: 15px;
            justify-content: center;
            width: 100%;
        }
        .penguin-choice-card {
            background: white;
            border: 2px solid #ebd9c5;
            border-radius: 16px;
            width: 110px;
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            font-size: 0.75rem;
            color: #a68e74;
            padding: 5px;
            text-align: center;
        }

        /* --- FRAME 2: SECURE PASSWORD LOCK VIEW --- */
        #frame-lock-screen {
            background: linear-gradient(180deg, #051408 0%, #020904 100%);
            justify-content: space-between;
            padding: 40px 20px;
        }
        .welcome-title {
            font-family: 'Great Vibes', cursive;
            font-size: 4.5rem;
            color: #ffffff;
            text-shadow: 0 0 15px rgba(121,247,149,0.4);
        }
        .lock-subtitle {
            font-size: 0.95rem;
            color: #a3c4ab;
            margin-top: 5px;
            text-align: center;
        }
        .lock-heart-dots {
            display: flex;
            gap: 16px;
            margin: 25px 0;
        }
        .heart-dot {
            font-size: 1.6rem;
            color: rgba(255,255,255,0.2);
            transition: color 0.2s;
        }
        .heart-dot.active {
            color: var(--text-glow-green);
            text-shadow: 0 0 10px var(--text-glow-green);
        }
        
        /* Layout Grid to display decorative side photos next to Keypad */
        .keypad-layout-container {
            display: grid;
            grid-template-columns: 60px 1fr 60px;
            gap: 10px;
            width: 100%;
            align-items: center;
            z-index: 5;
        }
        .side-photo-decor-frame {
            height: 260px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px dashed rgba(255,255,255,0.2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.65rem;
            color: #638c6d;
            text-align: center;
            padding: 4px;
        }
        .heart-keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px 14px;
            justify-items: center;
        }
        .heart-key {
            position: relative;
            width: 68px;
            height: 68px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .heart-key svg {
            position: absolute;
            width: 100%;
            height: 100%;
            fill: #13351a;
            stroke: #255d31;
            stroke-width: 1.5;
        }
        .heart-key:active svg {
            fill: #225c2d;
        }
        .heart-key span {
            position: relative;
            z-index: 2;
            font-size: 1.5rem;
            font-weight: 600;
            color: #d1ebd6;
        }
        .enter-bar-btn {
            width: 100%;
            max-width: 280px;
            border: 2px solid #32753f;
            background: linear-gradient(180deg, #174221 0%, #0d2a14 100%);
            color: #e2fce6;
            border-radius: 40px;
            padding: 12px 0;
            font-size: 1.1rem;
            letter-spacing: 4px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            z-index: 5;
        }

        /* --- FRAME 3: HAPPY BIRTHDAY PANDAS VIEW --- */
        #frame-panda-cake {
            background: linear-gradient(180deg, #091e0e 0%, #030d05 100%);
            justify-content: center;
        }
        .bday-banner-text {
            font-family: 'Great Vibes', cursive;
            font-size: 4rem;
            color: var(--accent-gold);
            text-align: center;
            line-height: 1.1;
            text-shadow: 0 0 20px rgba(226,192,103,0.4);
        }
        .bday-subname {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 2.5rem;
            color: #ffffff;
            margin-top: 5px;
            margin-bottom: 30px;
        }
        .cake-container-frame {
            width: 100%;
            height: 300px;
            background: rgba(255,255,255,0.02);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px dashed rgba
